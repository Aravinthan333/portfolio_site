# Manual deploy of the Next.js app in /new to an AWS EC2 Amazon Linux instance.
#
# Required GitHub secrets:
#   EC2_HOST             - Public IP or DNS name of the EC2 instance
#   EC2_SSH_PRIVATE_KEY  - Entire PEM private key
#   EC2_KNOWN_HOSTS      - Output of: ssh-keyscan -H <EC2_HOST>
#
# Optional GitHub secrets:
#   EC2_SSH_USER     - Defaults to ec2-user
#   DEPLOY_PATH      - Defaults to /var/www/portfolio/new
#   AUTH_SECRET      - CI smoke build only; production secret stays in the EC2 .env
#
# One-time on EC2: bash new/deploy/setup-vm.sh <repo-url> main

name: Deploy new (AWS EC2)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to deploy
        required: true
        default: main
        type: string
      run_migrations:
        description: Run prisma migrate deploy on the VM
        required: true
        default: true
        type: boolean
      skip_ci_build:
        description: Skip the CI build smoke check (faster, less safe)
        required: true
        default: false
        type: boolean

concurrency:
  group: deploy-new-aws-ec2
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy /new
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        if: ${{ inputs.skip_ci_build == false }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: new/package-lock.json

      - name: Install dependencies
        if: ${{ inputs.skip_ci_build == false }}
        working-directory: new
        run: npm ci

      - name: CI build smoke check
        if: ${{ inputs.skip_ci_build == false }}
        working-directory: new
        env:
          DATABASE_URL: file:./ci.db
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXT_PUBLIC_SITE_URL: https://aravinthanbalaji.com
          NEXT_PUBLIC_EMAIL: aravinthanbaalaji@gmail.com
          ADMIN_NAME: CI
          ADMIN_EMAIL: ci@example.com
          ADMIN_PASSWORD: ci-only-not-for-production
        run: |
          if [ -z "${AUTH_SECRET:-}" ] || [ "${#AUTH_SECRET}" -lt 32 ]; then
            echo "AUTH_SECRET missing or short - using CI placeholder"
            export AUTH_SECRET="ci-build-only-secret-32chars-min!!"
          fi
          npx prisma migrate deploy
          npm run build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_PRIVATE_KEY:-}" ] || [ -z "${KNOWN_HOSTS:-}" ]; then
            echo "EC2_SSH_PRIVATE_KEY and EC2_KNOWN_HOSTS secrets are required"
            exit 1
          fi
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/ec2_deploy_key"
          chmod 600 "$HOME/.ssh/ec2_deploy_key"
          printf '%s\n' "$KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GIT_REF: ${{ inputs.ref }}
          RUN_MIGRATIONS: ${{ inputs.run_migrations }}
        run: |
          set -euo pipefail

          if [ -z "${EC2_HOST:-}" ]; then
            echo "EC2_HOST secret is required"
            exit 1
          fi

          SSH_USER="${SSH_USER:-ec2-user}"
          DEPLOY_PATH="${DEPLOY_PATH:-/var/www/portfolio/new}"

          cat > /tmp/deploy-new-remote.sh <<'REMOTE_SCRIPT'
          set -euo pipefail
          DEPLOY_PATH="$1"
          GIT_REF="$2"
          RUN_MIGRATIONS="$3"

          echo "==> Deploying $GIT_REF into $DEPLOY_PATH"
          cd "$DEPLOY_PATH"

          if [ ! -f .env ]; then
            echo "Missing $DEPLOY_PATH/.env on EC2. Create it before deploying."
            exit 1
          fi

          if [ -d .git ]; then
            REPO_DIR="$DEPLOY_PATH"
          elif [ -d ../.git ]; then
            REPO_DIR="$(cd .. && pwd)"
          else
            echo "No git repo at $DEPLOY_PATH or its parent. Re-run setup-vm.sh."
            exit 1
          fi

          cd "$REPO_DIR"
          git fetch --prune origin
          git checkout --force "$GIT_REF"
          git reset --hard "origin/$GIT_REF" 2>/dev/null || git reset --hard "$GIT_REF"
          cd "$DEPLOY_PATH"

          mkdir -p "$HOME/.npm"
          npm ci --cache "$HOME/.npm" --prefer-offline

          if [ "$RUN_MIGRATIONS" = "true" ]; then
            npx prisma migrate deploy
          else
            echo "==> Skipping migrations"
          fi

          # t2.micro has 1 GiB RAM. setup-vm.sh creates swap for this build.
          npm run build
          sudo systemctl restart portfolio-new
          sudo systemctl is-active --quiet portfolio-new
          echo "==> Deploy finished"
          REMOTE_SCRIPT

          printf -v REMOTE_COMMAND 'bash -s -- %q %q %q' \
            "$DEPLOY_PATH" "$GIT_REF" "$RUN_MIGRATIONS"

          ssh \
            -i "$HOME/.ssh/ec2_deploy_key" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            "$SSH_USER@$EC2_HOST" \
            "$REMOTE_COMMAND" < /tmp/deploy-new-remote.sh
