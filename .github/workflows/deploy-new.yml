# Manual deploy of the Next.js app in /new to an AWS EC2 Amazon Linux instance.
#
# Required secrets in the GitHub Environment named "prod":
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
#   EC2_USER, EC2_IP, EC2_SSH_KEY
#
# The repository's new/ directory is deployed to ~/new on EC2.
# Production environment values stay in ~/.env on EC2 and are linked to ~/new/.env.
# The first deployment bootstraps Node.js, swap, and the systemd website service.
# nginx and TLS are managed independently by configure-nginx.yml.

name: Deploy website (AWS EC2)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to deploy
        required: true
        default: main
        type: string
      run_migrations:
        description: Run prisma migrate deploy on the VM
        required: true
        default: true
        type: boolean
      skip_ci_build:
        description: Skip the CI build smoke check (faster, less safe)
        required: true
        default: false
        type: boolean

concurrency:
  group: deploy-new-aws-ec2
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy /new
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        if: ${{ inputs.skip_ci_build == false }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: new/package-lock.json

      - name: Install dependencies
        if: ${{ inputs.skip_ci_build == false }}
        working-directory: new
        run: npm ci

      - name: CI build smoke check
        if: ${{ inputs.skip_ci_build == false }}
        working-directory: new
        env:
          DATABASE_URL: file:./ci.db
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXT_PUBLIC_SITE_URL: https://aravinthanbalaji.com
          NEXT_PUBLIC_EMAIL: aravinthanbaalaji@gmail.com
          ADMIN_NAME: CI
          ADMIN_EMAIL: ci@example.com
          ADMIN_PASSWORD: ci-only-not-for-production
        run: |
          if [ -z "${AUTH_SECRET:-}" ] || [ "${#AUTH_SECRET}" -lt 32 ]; then
            echo "AUTH_SECRET missing or short - using CI placeholder"
            export AUTH_SECRET="ci-build-only-secret-32chars-min!!"
          fi
          npx prisma migrate deploy
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - name: Configure SSH
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${EC2_IP:-}" ] || [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "EC2_IP and EC2_SSH_KEY secrets are required"
            exit 1
          fi
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/ec2_deploy_key"
          chmod 600 "$HOME/.ssh/ec2_deploy_key"
          ssh-keyscan -H "$EC2_IP" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Upload /new release to EC2
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -euo pipefail
          if [ -z "${EC2_USER:-}" ]; then
            echo "EC2_USER secret is required"
            exit 1
          fi

          tar \
            --exclude='.env' \
            --exclude='.next' \
            --exclude='node_modules' \
            --exclude='prisma/*.db' \
            --exclude='prisma/*.db-journal' \
            --exclude='public/uploads' \
            -C new -czf - . \
            | ssh \
                -i "$HOME/.ssh/ec2_deploy_key" \
                -o BatchMode=yes \
                -o StrictHostKeyChecking=yes \
                -o ServerAliveInterval=30 \
                "$EC2_USER@$EC2_IP" \
                'rm -rf "$HOME/new-release" && mkdir -p "$HOME/new-release" && tar -xzf - -C "$HOME/new-release"'

      - name: Build and restart on EC2
        env:
          EC2_IP: ${{ secrets.EC2_IP }}
          EC2_USER: ${{ secrets.EC2_USER }}
          RUN_MIGRATIONS: ${{ inputs.run_migrations }}
        run: |
          set -euo pipefail

          cat > /tmp/deploy-new-remote.sh <<'REMOTE_SCRIPT'
          set -euo pipefail
          shopt -s nullglob
          RUN_MIGRATIONS="$1"
          APP_DIR="$HOME/new-release"
          LIVE_DIR="$HOME/new"
          PREVIOUS_DIR="$HOME/new-previous"
          ENV_FILE="$HOME/.env"

          if [ ! -f "$ENV_FILE" ]; then
            echo "Missing $ENV_FILE on EC2."
            exit 1
          fi

          FIRST_DEPLOY=true
          SERVICE_STOPPED=false
          if systemctl list-unit-files --type=service | grep -q '^portfolio-new.service'; then
            FIRST_DEPLOY=false
            sudo systemctl stop portfolio-new
            SERVICE_STOPPED=true
          fi

          recover_service() {
            if [ "$SERVICE_STOPPED" = true ] && [ -d "$LIVE_DIR" ]; then
              echo "Deployment failed - restarting the current release"
              sudo systemctl restart portfolio-new || true
            fi
          }
          trap recover_service ERR

          mkdir -p "$APP_DIR/prisma" "$APP_DIR/public/uploads"

          # Carry persistent SQLite data and uploaded media into the new release.
          if [ -d "$LIVE_DIR" ]; then
            DB_FILES=("$LIVE_DIR"/prisma/*.db "$LIVE_DIR"/prisma/*.db-journal)
            if [ "${#DB_FILES[@]}" -gt 0 ]; then
              cp -a "${DB_FILES[@]}" "$APP_DIR/prisma/"
            fi
            if [ -d "$LIVE_DIR/public/uploads" ]; then
              cp -a "$LIVE_DIR/public/uploads/." "$APP_DIR/public/uploads/"
            fi
          fi

          cd "$APP_DIR"
          ln -sfn "$ENV_FILE" .env

          # First deployment also bootstraps Amazon Linux, swap, nginx, and systemd.
          if [ "$FIRST_DEPLOY" = true ]; then
            rm -rf "$LIVE_DIR"
            mv "$APP_DIR" "$LIVE_DIR"
            bash "$LIVE_DIR/deploy/setup-vm.sh"
            exit 0
          fi

          mkdir -p "$HOME/.npm"
          npm ci --cache "$HOME/.npm" --prefer-offline

          if [ "$RUN_MIGRATIONS" = "true" ]; then
            npx prisma migrate deploy
          else
            echo "==> Skipping migrations"
          fi

          # t2.micro has 1 GiB RAM. setup-vm.sh creates swap for this build.
          rm -rf .next
          npm run build

          rm -rf "$PREVIOUS_DIR"
          if [ -d "$LIVE_DIR" ]; then
            mv "$LIVE_DIR" "$PREVIOUS_DIR"
          fi
          mv "$APP_DIR" "$LIVE_DIR"

          if ! sudo systemctl restart portfolio-new || \
             ! sudo systemctl is-active --quiet portfolio-new || \
             ! curl --fail --silent --show-error \
                 --retry 10 --retry-connrefused --retry-delay 2 \
                 http://127.0.0.1:3001/ >/dev/null; then
            echo "New release failed to start - rolling back"
            rm -rf "$APP_DIR"
            mv "$LIVE_DIR" "$APP_DIR"
            if [ -d "$PREVIOUS_DIR" ]; then
              mv "$PREVIOUS_DIR" "$LIVE_DIR"
              sudo systemctl restart portfolio-new
            fi
            SERVICE_STOPPED=false
            exit 1
          fi

          SERVICE_STOPPED=false
          rm -rf "$PREVIOUS_DIR"
          echo "==> Deploy finished"
          REMOTE_SCRIPT

          printf -v REMOTE_COMMAND 'bash -s -- %q' "$RUN_MIGRATIONS"

          ssh \
            -i "$HOME/.ssh/ec2_deploy_key" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            "$EC2_USER@$EC2_IP" \
            "$REMOTE_COMMAND" < /tmp/deploy-new-remote.sh
