# Optional nginx reverse proxy in front of the Node app on :3001
# Place at /etc/nginx/sites-available/portfolio and symlink into sites-enabled.
#
# After DNS points here:
#   sudo certbot --nginx -d aravinthanbalaji.com -d www.aravinthanbalaji.com

upstream portfolio_new {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name aravinthanbalaji.com www.aravinthanbalaji.com;

    client_max_body_size 20m;

    location / {
        proxy_pass http://portfolio_new;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
